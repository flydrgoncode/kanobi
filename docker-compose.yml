services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "3737:3737"
    environment:
      NODE_ENV: production
      PORT: 3737
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      DATABASE_PATH: /data/kanobi.db
    volumes:
      - db_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3737/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  db_data:
